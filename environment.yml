name: hermes
channels:
  - conda-forge
dependencies:
  # Runtime
  - python=3.10
  - pip
  - numpy
  - scipy
  - scikit-image
  - tifffile
  - imageio
  - imagecodecs
  - trimesh
  - networkx
  - pandas
  - matplotlib
  - pillow
  - psutil

  # GUI and visualization
  - pyqt=5
  - pyvista
  - pyvistaqt

  # MPI / HPC
  - openmpi
  - mpi4py

  # Testing
  - pytest
  - pytest-qt

  # Optional developer utilities
  - black
  - ruff

  # PyMeshLab availability on conda can lag by platform, so install it with pip.
  - pip:
      - pymeshlab==2023.12.post2
